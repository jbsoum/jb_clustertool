# yaml-language-server: $schema=./values.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease

metadata:
  name: websurfx
  namespace: websurfx

spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 18.6.5
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  #timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    image:
      repository: docker.io/neonmmd/websurfx
      tag: latest
      pullPolicy: IfNotPresent

    service:
      main:
        ports:
          main:
            port: 8080
            targetPort: 10238
            protocol: http

    securityContext:
      container:
        readOnlyRootFilesystem: false
        runAsGroup: 0
        runAsUser: 0
        global:
          stopAll: false

    TZ: ${TIMEZONE}

    credentials:
      backblaze:
        accessKey: ${S3_ACCESS_KEY}
        bucket: ${S3_BUCKET}
        encrKey: ${S3_ENCRYPTION_KEY}
        name: ${S3_NAME}
        path: ""
        secretKey: ${S3_SECRET_KEY}
        type: s3
        url: ${S3_URL}

    ingress:
      main:
        enabled: true
        ingressClassName: external
        integrations:
          homepage:
            enabled: true
            group: Utilities
            widget:
              enabled: false
          certManager:
            enabled: true
            certificateIssuer: ${DNS_NAME}
          nginx:
            enabled: true
            auth:
              type: "authelia"
              internalHost: "authelia.authelia.svc.cluster.local:9091"
              externalHost: "${SUBDOMAIN_AUTHELIA}.${DOMAIN_0}"
              # Can be left default in most cases
              responseHeaders: []
        hosts:
          - host: websurfx.${DOMAIN_0}

    persistence:
      config:
        enabled: true
        type: emptyDir
        mountPath: /etc/xdg/websurfx
        volsync:
          - name: config
            type: restic
            credentials: ${S3_NAME}
            dest: #VolSync Destination (Restore)
              enabled: true
            src: #VolSync Source (Backup)
              enabled: true
              trigger:
                schedule: 40 0 * * *
  
      configfile:
        enabled: true
        type: configmap
        objectName: websurfx-config.lua
        expandObjectName: false
        mountPath: /etc/xdg/websurfx/config.lua
        subPath: config.lua
        readOnly: true

    workload:
      main:
        podSpec:
          containers:
            main:
              env:
                RUST_BACKTRACE: 1
              lifecycle:
                postStart:
                  type: exec
                  command: 
                    - /bin/sh
                    - -c
                    - |
                      if [ -f "/etc/xdg/websurfx/allowlist.txt" ]; then
                        echo "allowlist.txt exists already, no need to create..."
                      else
                        touch /etc/xdg/websurfx/allowlist.txt
                      fi

                      if [ -f "/etc/xdg/websurfx/blocklist.txt" ]; then
                        echo "blocklist.txt exists already, no need to create..."
                      else
                        touch /etc/xdg/websurfx/blocklist.txt
                      fi

