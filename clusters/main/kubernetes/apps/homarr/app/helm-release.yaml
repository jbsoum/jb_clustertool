apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease

metadata:
  name: homarr
  namespace: homarr

spec:
  interval: 15m
  chart:
    spec:
      chart: homarr
      version: 15.12.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  #timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    global:
      stopAll: false
    TZ: ${TIMEZONE}

    credentials:
      backblaze:
        accessKey: ${S3_ACCESS_KEY}
        bucket: ${S3_BUCKET}
        encrKey: ${S3_ENCRYPTION_KEY}
        name: ${S3_NAME}
        path: ""
        secretKey: ${S3_SECRET_KEY}
        type: s3
        url: ${S3_URL}

    ingress:
      main:
        enabled: true
        ingressClassName: external
        integrations:
          homepage:
            enabled: true
            group: Utilities
            widget:
              enabled: false
          certManager:
            enabled: true
            certificateIssuer: ${DNS_NAME}
          nginx:
            enabled: true
            auth:
              type: "authelia"
              internalHost: "authelia.authelia.svc.cluster.local:9091"
              externalHost: "${SUBDOMAIN_AUTHELIA}.${DOMAIN_0}"
              # Can be left default in most cases
              responseHeaders: []
        hosts:
          - host: ${DOMAIN_0}

    persistence:
      appdata:
        volsync:
          - name: appdata
            type: restic
            credentials: ${S3_NAME}
            dest: #VolSync Destination (Restore)
              enabled: true
            src: #VolSync Source (Backup)
              enabled: true
              trigger:
                schedule: 40 0 * * *

    workload:
      main:
        podSpec:
          containers:
            main:
              env:
                SECRET_ENCRYPTION_KEY: "${HOMARR_SECRET_ENCRYPTION_KEY}"
                AUTH_LOGOUT_REDIRECT_URL: "https://${DOMAIN_0}"
                AUTH_PROVIDERS: ldap
                AUTH_LDAP_URI: ldap://lldap-ldap.lldap.svc.cluster.local:3890
                AUTH_LDAP_BASE: dc=${DC_SUBDOMAIN},dc=${DC_DOMAIN} #Same as LLDAP_LDAP_BASE_DN
                AUTH_LDAP_BIND_DN: uid=${AUTHELIA_LLDAP_GROUP_NAME},ou=People,dc=${DC_SUBDOMAIN},dc=${DC_DOMAIN}
                AUTH_LDAP_BIND_PASSWORD: ${AUTHELIA_LLDAP_PASSWORD} #Same as LLDAP_LDAP_USER_PASS
