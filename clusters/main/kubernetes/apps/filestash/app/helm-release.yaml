apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease

metadata:
  name: filestash
  namespace: filestash

spec:
  interval: 15m
  chart:
    spec:
      chart: filestash
      version: 10.5.1
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  #timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    global:
      stopAll: false

    TZ: ${TIMEZONE}

    credentials:
      backblaze:
        accessKey: ${S3_ACCESS_KEY}
        bucket: ${S3_BUCKET}
        encrKey: ${S3_ENCRYPTION_KEY}
        name: ${S3_NAME}
        path: ""
        secretKey: ${S3_SECRET_KEY}
        type: s3
        url: ${S3_URL}

    ingress:
      main:
        enabled: true
        ingressClassName: external
        integrations:
          homepage:
            enabled: true
            group: Utilities
            widget:
              enabled: false
          certManager:
            enabled: true
            certificateIssuer: ${DNS_NAME}
          nginx:
            enabled: true
            auth:
              type: "authelia"
              internalHost: "authelia.authelia.svc.cluster.local:9091"
              externalHost: "${SUBDOMAIN_AUTHELIA}.${DOMAIN_0}"
              # Can be left default in most cases
              responseHeaders: []
        hosts:
          - host: filestash.${DOMAIN_0}

    persistence:
      data:
        type: nfs
        server: ${IP_TRUENAS}
        path: ${NFS_FILESTASH}
        volsync:
          - name: data
            type: restic
            credentials: ${S3_NAME}
            dest: #VolSync Destination (Restore)
              enabled: true
            src: #VolSync Source (Backup)
              enabled: true
              trigger:
                schedule: 40 0 * * *

    workload:
      main:
        podSpec:
          containers:
            main:
              env:
                APPLICATION_URL: "http://localhost:8334"
                GDRIVE_CLIENT_ID: ""
                GDRIVE_CLIENT_SECRET: ""
                DROPBOX_CLIENT_ID: ""
                ONLYOFFICE_URL: "http://onlyoffice-document-server.onlyoffice-document-server.svc.cluster.local:10043"